services:
  - type: web
    name: masterchef-api
    runtime: node
    buildCommand: npm ci && npm run build -w shared && npm run build -w backend
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://ammarsathar.github.io/MasterChef
      # Set these in the Render dashboard (sync: false = managed outside this file)
      - key: MONGODB_URI
        sync: false
      - key: BETTER_AUTH_URL
        # Set to your Render service URL, e.g. https://masterchef-api.onrender.com
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GH_CLIENT_ID
        sync: false
      - key: GH_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RECIPE_MODEL
        value: gpt-4o-mini
