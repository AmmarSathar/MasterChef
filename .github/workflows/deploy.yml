name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev-features-eol]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Build frontend
        env:
          VITE_BASE_PATH: /MasterChef/
          VITE_BASE_API_URL: ${{ secrets.VITE_BASE_API_URL }}
        run: npm run build -w frontend

      # GitHub Pages returns 404 for unknown paths; serving index.html as 404
      # causes the React Router to handle the route client-side.
      - name: Create 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
