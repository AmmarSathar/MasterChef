name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      FRONTEND_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:4000
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'dev-test-secret' }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'test-google-client-id' }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'test-google-client-secret' }}
      GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID || 'test-github-client-id' }}
      GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET || 'test-github-client-secret' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: E2E
        run: npm run e2e
